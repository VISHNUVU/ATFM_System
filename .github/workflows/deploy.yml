name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 76.13.244.25
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/atfm
            git pull origin main
            systemctl restart atfm
            echo "Deployed at $(date)"
